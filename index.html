<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Contador" />
  <title>Contador PWA</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #555;
      --btn-size: min(72px, 18vw);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.5;
    }

    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      padding: 40px 24px;
      width: 100%;
      max-width: 400px;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .counter-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
    }

    .counter-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(96px, 28vw, 160px);
      line-height: 0.9;
      color: var(--text);
      transition: transform 0.08s cubic-bezier(0.34, 1.56, 0.64, 1),
                  color 0.15s ease;
      will-change: transform;
    }

    .counter-number.bump {
      transform: scale(1.08);
      color: var(--accent);
    }

    .divider {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--muted), transparent);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .btn {
      width: var(--btn-size);
      height: var(--btn-size);
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-family: 'Bebas Neue', sans-serif;
      font-size: calc(var(--btn-size) * 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }

    .btn:active {
      transform: scale(0.92);
    }

    .btn-main {
      background: var(--accent);
      color: var(--bg);
      width: calc(var(--btn-size) * 1.6);
      height: calc(var(--btn-size) * 1.6);
      font-size: calc(var(--btn-size) * 0.65);
      box-shadow: 0 0 40px rgba(232, 255, 71, 0.25);
    }

    .btn-main:active {
      box-shadow: 0 0 60px rgba(232, 255, 71, 0.45);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--muted);
      border: 1px solid #2a2a2a;
    }

    .btn-secondary:hover {
      color: var(--text);
      border-color: #444;
    }

    .btn-reset {
      background: transparent;
      color: var(--muted);
      border: 1px solid #222;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      width: auto;
      height: auto;
      padding: 10px 20px;
      border-radius: 100px;
    }

    .btn-reset:hover { color: #ff6b6b; border-color: #ff6b6b44; }

    .stats {
      display: flex;
      gap: 32px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .stat-value {
      font-size: 20px;
      font-family: 'Bebas Neue', sans-serif;
      color: var(--text);
    }

    .stat-label {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(0,0,0,0.2);
      transform: scale(0);
      animation: ripple-anim 0.4s linear;
      pointer-events: none;
    }

    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    /* PWA install banner */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 12px;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 200;
      white-space: nowrap;
    }

    #install-banner.hidden { display: none !important; }

    #install-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      padding: 7px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.05em;
    }

    #dismiss-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0 4px;
    }
  </style>
</head>
<body>

<div class="app">
  <span class="label">Contador</span>

  <div class="counter-display">
    <div class="counter-number" id="count">0</div>
  </div>

  <div class="divider"></div>

  <div class="controls">
    <button class="btn btn-secondary" id="btn-minus" aria-label="Restar uno">−</button>
    <button class="btn btn-main" id="btn-plus" aria-label="Sumar uno">+</button>
    <button class="btn btn-reset" id="btn-reset">reset</button>
  </div>

  <div class="stats">
    <div class="stat">
      <span class="stat-value" id="stat-max">0</span>
      <span class="stat-label">Máximo</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-taps">0</span>
      <span class="stat-label">Pulsaciones</span>
    </div>
  </div>
</div>

<!-- Banner instalación -->
<div id="install-banner" class="hidden">
  <span>📲 Instalar como app</span>
  <button id="install-btn">Instalar</button>
  <button id="dismiss-btn">✕</button>
</div>

<script>
  // ── Estado ──────────────────────────────────────────────────────
  let count = parseInt(localStorage.getItem('count') || '0');
  let maxVal = parseInt(localStorage.getItem('max') || '0');
  let taps   = parseInt(localStorage.getItem('taps') || '0');

  const countEl  = document.getElementById('count');
  const maxEl    = document.getElementById('stat-max');
  const tapsEl   = document.getElementById('stat-taps');

  function render() {
    countEl.textContent = count;
    maxEl.textContent   = maxVal;
    tapsEl.textContent  = taps;
    localStorage.setItem('count', count);
    localStorage.setItem('max',   maxVal);
    localStorage.setItem('taps',  taps);
  }

  function bump() {
    countEl.classList.remove('bump');
    void countEl.offsetWidth; // reflow para reiniciar animación
    countEl.classList.add('bump');
    setTimeout(() => countEl.classList.remove('bump'), 200);
  }

  function rippleEffect(btn, e) {
    const r = document.createElement('span');
    r.className = 'ripple';
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.style.width = r.style.height = size + 'px';
    r.style.left = (e.clientX - rect.left - size/2) + 'px';
    r.style.top  = (e.clientY - rect.top  - size/2) + 'px';
    btn.appendChild(r);
    r.addEventListener('animationend', () => r.remove());
  }

  // ── Botones ──────────────────────────────────────────────────────
  document.getElementById('btn-plus').addEventListener('click', e => {
    count++;
    taps++;
    if (count > maxVal) maxVal = count;
    bump();
    rippleEffect(e.currentTarget, e);
    render();
  });

  document.getElementById('btn-minus').addEventListener('click', e => {
    if (count > 0) { count--; bump(); }
    rippleEffect(e.currentTarget, e);
    render();
  });

  document.getElementById('btn-reset').addEventListener('click', () => {
    count = 0;
    render();
  });

  render();

  // ── Service Worker ───────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('✅ Service Worker registrado'))
      .catch(err => console.warn('SW error:', err));
  }

  // ── Instalar PWA ─────────────────────────────────────────────────
  let deferredPrompt;
  const banner    = document.getElementById('install-banner');
  const installBtn = document.getElementById('install-btn');
  const dismissBtn = document.getElementById('dismiss-btn');

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    banner.classList.remove('hidden');
  });

  installBtn.addEventListener('click', async () => {
    banner.classList.add('hidden');
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log('Install outcome:', outcome);
    deferredPrompt = null;
  });

  dismissBtn.addEventListener('click', () => banner.classList.add('hidden'));
  window.addEventListener('appinstalled', () => banner.classList.add('hidden'));
</script>
</body>
</html>
